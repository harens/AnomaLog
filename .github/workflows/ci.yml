name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Sync Dependencies
        run: uv sync --frozen --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

  ty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Sync Dependencies
        run: uv sync --frozen --all-groups

      - name: Type check
        run: uv run ty check

  pydoclint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Sync Dependencies
        run: uv sync --frozen --all-groups

      - name: Docstring lint
        run: uv run pydoclint --style=google anomalog experiments

  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      # Temporary workaround for River on Python 3.14:
      # https://github.com/online-ml/river/issues/1760
      - name: Set up Rust
        if: matrix.python-version == '3.14'
        uses: dtolnay/rust-toolchain@stable

      - name: Sync Dependencies
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: ${{ matrix.python-version == '3.14' && '1' || '' }}
        run: uv sync --frozen --all-groups

      - name: Run tests
        run: >
          uv run pytest
          --doctest-modules
          --cov=anomalog
          --cov-report=xml:coverage.xml
          --junitxml=junit.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && matrix.python-version == '3.12' }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report-type: test_results
          files: junit.xml

      - name: Upload coverage reports to Codecov
        if: ${{ matrix.python-version == '3.12' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
